services:
  numtracker:
    image: ghcr.io/diamondlightsource/numtracker:1.0.1
    ports:
      - "8001:8001"
    environment:
      NUMTRACKER_PORT: 8001
    post_start:
      - command: /app/numtracker client configure adsim --directory '/tmp/{instrument}/data/{year}/{visit}' --scan '{subdirectory}/{instrument}-{scan_number}' --detector '{subdirectory}/{scan_number}/{instrument}-{scan_number}-{detector}'
