apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "blueapi.fullname" . }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "blueapi.fullname" . }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["pods", "persistentvolumeclaims"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "blueapi.fullname" . }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "blueapi.fullname" . }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "blueapi.fullname" . }}-last-used-stamper
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "blueapi.fullname" . }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
spec:
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  schedule: "*/5 * * * *"

  jobTemplate:
    spec:
      # amount of attempts of labeling a pvc
      backoffLimit: 0
      # job stops after 60 secounds
      activeDeadlineSeconds: 60
      template:
        spec:
          serviceAccountName: {{ include "blueapi.fullname" . }}-last-used-stamper
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumes:
            - name : {{include "blueapi.fullname" . }}-pvc-stamper-script
              configMap:
                name: {{include "blueapi.fullname" . }}-pvc-stamper-script
                defaultMode: 0555


          containers:
          - name: last-used-stamper
            volumeMounts:
              - name: {{include "blueapi.fullname" . }}-pvc-stamper-script
                mountPath: /scripts
            image: bitnami/kubectl:latest
            imagePullPolicy: IfNotPresent
            command: ["/scripts/time-stamper.sh"]
          restartPolicy: OnFailure
