# .github/workflows/ci.yml
name: CI
on:
  pull_request:
  push:
    branches: [main]
    tags: ["*"]

jobs:
  docs: # Call the docs building workflow directly
    uses: DiamondLightSource/myst-version-switcher-plugin/.github/workflows/docs.yml@v0.20.0
    with:
      # Whatever turns your sources into docs/_build/html at $BASE_URL. uv and Node
      # are preinstalled, so: make docs · tox -e docs · npm ci && npm run docs
      build-command: |
        uv run --locked tox -e docs # Build docs
        rm _build/html/.doctrees/environment.pickle # Remove environment.pickle

  release:
    needs: [docs]
    if: github.ref_type == 'tag' # tag pushes only
    uses: DiamondLightSource/myst-version-switcher-plugin/.github/workflows/release.yml@v0.20.0
    permissions:
      contents: write # create the Release + attach assets

  publish:
    needs: [docs]
    # don't publish a pages site in the fork's org
    if: github.repository == 'shree-iyengar-dls/blueapi'
    uses: ./.github/workflows/publish-dispatch.yml # your workflow (below)
    with:
      version-name: ${{ needs.docs.outputs.version-name }}
    permissions:
      contents: read
      actions: write
      pages: write
      id-token: write
      statuses: write
