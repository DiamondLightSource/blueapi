apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "blueapi.fullname" . }}-test-connection"
  labels:
    {{- include "blueapi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  volumes:
  - name: worker-config
    projected:
      sources:
        - configMap:
            name: {{ include "blueapi.fullname" . }}-config
  containers:
    - name: ping
      volumeMounts:
      - name: worker-config
        mountPath: "/config"
        readOnly: true
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      command: ["blueapi"]
      args:
        - "-c"
        - "/config/config.yaml"
        - "controller"
        - "plans"
  restartPolicy: Never
