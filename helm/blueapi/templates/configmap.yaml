apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "blueapi.fullname" . }}-config
data:
  config.yaml: |-
    {{- toYaml .Values.worker | nindent 4 }}

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "blueapi.fullname" . }}-otel-config
data:
{{- if .Values.tracing.otlp.enabled | default false }}
  OTLP_EXPORT_ENABLED: "true"
  OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: {{ .Values.tracing.otlp.protocol | default "http/protobuf" }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ required "OTLP export enabled but server address not set" .Values.tracing.otlp.server.host }}:{{ .Values.tracing.otlp.server.port | default 4318 }}
  OTEL_PYTHON_FASTAPI_EXCLUDED_URLS: {{ .Values.tracing.fastapi.excludedURLs | default "" }}
{{ end }}

---

{{- if .Values.initContainer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "blueapi.fullname" . }}-init-config
data:
  init_config.yaml: |-
    scratch:
      {{- toYaml .Values.worker.scratch | nindent 6 }}

---    
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name : {{include "blueapi.fullname" . }}-pvc-stamper-script
data:
  time-stamper.sh: |
    #!/bin/sh
    # Get PVCs belonging to this blueapi release
    ALL_PVC=$(kubectl get pvc -n {{ .Release.Namespace }} \
      -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | \
      grep "^{{ .Release.Name }}-scratch-")
    # Get all PVCs currently mounted by running pods
    MOUNTED_PVCS=$(kubectl get pods -n {{ .Release.Namespace }} \
      -o=jsonpath='{.items[*].spec.volumes[*].persistentVolumeClaim.claimName}' | tr ' ' '\n' | sort -u)
    NOW=$(date +%s)
    #loop through all the pvcs annotating ones thare are mounted or lack a last-used stamp
    for pvc in $ALL_PVC; do
      ANNOTATION=$(kubectl get pvc "$pvc" -n {{ .Release.Namespace }} -o=jsonpath='{.metadata.annotations.last-used}')
      if [ -z "$ANNOTATION" ]; then
        kubectl annotate --overwrite pvc "$pvc" -n {{ .Release.Namespace }} last-used="$NOW"
      elif echo "$MOUNTED_PVCS" | grep -qx "$pvc"; then
        kubectl annotate --overwrite pvc "$pvc" -n {{ .Release.Namespace }} last-used="$NOW"
      fi
    done
