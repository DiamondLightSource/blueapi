api:
  url: http://0.0.0.0:8000
env:
  metadata:
    instrument: adsim
  sources:
    - kind: deviceManager
      module: dodal.beamlines.adsim
    - kind: planFunctions
      module: dodal.plans
    - kind: planFunctions
      module: dodal.plan_stubs.wrapped
stomp:
  enabled: true
  url: tcp://localhost:61613/
numtracker:
  url: http://localhost:8406/graphql
tiled:
  enabled: true
  url: http://localhost:8407/api/v1
  authentication:
    client_id: "tiled-writer"
    client_secret: "secret"
oidc:
  issuer: "http://localhost:8081/realms/master"
  client_id: "ixx-cli-blueapi"
  client_audience: "ixx-blueapi"
opa:
  root: "http://localhost:8181/v1/data/diamond/policy/"
  tiled_service_account_check: "blueapi/tiled_service_account_for_beamline"
  submit_task_check: "blueapi/write_to_beamline_visit"
  admin_check: "admin/admin"
