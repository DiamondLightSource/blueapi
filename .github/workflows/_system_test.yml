on:
  workflow_call:

env:
  # https://github.com/pytest-dev/pytest/issues/2042
  PY_IGNORE_IMPORTMISMATCH: "1"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # Need this to get version number from last tag
          fetch-depth: 0
          # Check out example services
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Compose services
        uses: hoverkraft-tech/compose-action@248470ecc5ed40d8ed3d4480d8260d77179ef579 # v2.4.2
        with:
          compose-file: "tests/system_tests/compose.yaml"
      
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2.2.0
        with:
          version: latest
        
      - name: Run OPA
        run: export ISSUER=http://localhost:8081/realms/master;opa build -b tests/system_tests/services/opa_config/opa_data;opa run --server --addr localhost:8181 -b ./bundle.tar.gz --config-file ./tests/system_tests/services/opa_config/config.yaml &

      - name: Start Tiled
        run: docker run -d --name tiled --network host -v "./tests/system_tests/services/tiled_config:/deploy/config"  ghcr.io/zohebshaikh/tiled:0.4.19  tiled serve config --host localhost --port 8407
          
      - name: Start Blueapi Server
        env:
          EPICS_CA_NAME_SERVERS: 127.0.0.1:9064
          EPICS_PVA_NAME_SERVERS: 127.0.0.1:9075
        run: uv run blueapi -c ${{ github.workspace }}/tests/system_tests/config.yaml serve &

      - name: Run tests
        run: uv run --locked tox -e system-test
