apiVersion: v1
kind: Pod
metadata:
  name: {{ include "blueapi.fullname" . }}-last-used-stamper
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: {{ include "blueapi.fullname" . }}-last-used-stamper
  containers:
    - name: test
      image: bitnami/kubectl:1.34.5
      command: ["/bin/sh", "-c"]
      args:
        - |
          # Get a pod belonging to this release and annotate it, then verify
          kubectl annotate --overwrite pod "$HOSTNAME" -n "{{ .Release.Namespace }}" last-used="$(date +%s)"
          kubectl get pod "$HOSTNAME" -n "{{ .Release.Namespace }}" \
            -o jsonpath='{.metadata.annotations.last-used}' | grep -q .
  restartPolicy: Never
